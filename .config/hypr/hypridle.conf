# hypridle configuration for ardal-dotfiles
# Docs: https://github.com/hyprwm/hypridle
# Scope: keep minimal - just session lock on idle. No dim/dpms handlers yet.
#
# LID NOTE (read this before editing):
#   hypridle does NOT support `event = "lid"`. It only listens to Wayland idle
#   timeouts and D-Bus lock/sleep signals - it cannot observe the lid switch.
#   Toggling eDP-1 on lid close must be done at the system level (logind drop-in
#   + udev/acpid script calling `hyprctl keyword monitor "eDP-1,disable"`).
#   See monitors.conf for the recommended setup. Keep lid handling OUT of this
#   file - it belongs to logind, not the idle daemon.

general {
    # Fires when loginctl sends a Lock signal. Uses qylock/Quickshell animated lock.
    lock_cmd = $HOME/.local/share/quickshell-lockscreen/lock.sh

    # before_sleep fires on logind PrepareForSleep; lock first so screen is
    # secure before suspend. Kept here even though we lean on logind for lid.
    before_sleep_cmd = loginctl lock-session

    # Wake the display back up after resume.
    after_sleep_cmd = hyprctl dispatch dpms on

    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
}

# 5 min idle -> lock session via qylock/Quickshell (general.lock_cmd).
# No on-resume needed for a pure lock; user dismisses by typing password.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}