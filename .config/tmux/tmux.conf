# /* ---- ardal dotfiles - tmux ---- */  #

# -- Terminal / colors --
# tmux-256color is the safe inner TERM. With kitty's outer TERM=xterm-256color
# we stay in 256-color land (SSH-safe). terminal-features entry is harmless
# and enables RGB passthrough if you later switch kitty to TERM=kitty.
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",kitty:RGB"

# -- Basics --
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on
setw -g automatic-rename on
set -g base-index 1
setw -g pane-base-index 1

# -- Status bar --
set -g status on
set -g status-interval 2
set -g status-style "bg=default,fg=default"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=brightblack]%H:%M #[fg=cyan]#{?client_prefix,#[fg=yellow]PREFIX,tmux}"

# Active window marker
setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# -- Prefix: Ctrl-a (easier on Arch/Hypr than default Ctrl-b) --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# -- Splits (intuitive, keep current path) --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- Pane navigation (vim-style) --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane resize --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- New window keeps current path --
bind c new-window -c "#{pane_current_path}"

# -- Plugins (TPM) --
# Keep plugins under XDG config dir instead of ~/.tmux
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jaclu/tmux-menus'

# tmux-menus: trigger without prefix for quick access
set -g @menus_without_prefix 'Yes'

# -- TPM bootstrap (must stay at the very bottom) --
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' 'run ~/.config/tmux/plugins/tpm/tpm'
