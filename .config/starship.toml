# Starship config — Tokyo Night palette, waybar-aligned.
# No powerline bars. Clean colored symbols on default background,
# matching waybar's minimal pill aesthetic.
#
# Palette (from ~/.config/waybar/style.css):
#   FG      #c0caf5   default text
#   BG      #1a1b26   base background (terminal)
#   PURPLE  #bb9af7
#   CYAN    #7dcfff
#   GREEN   #9ece6a
#   YELLOW  #e0af68
#   RED     #f7768e
#   GREY    #565f89

"$schema" = 'https://starship.rs/config-schema.json'

# Single line, no powerline separators. Just colored segments.
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold #7dcfff"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "#f7768e"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"~" = " "

[git_branch]
symbol = " "
style = "bold #bb9af7"
format = "[$symbol$branch]($style) "

[git_status]
style = "#e0af68"
format = '([$all_status$ahead_behind]($style) )'
conflicted = " "
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
untracked = "?${count}"
stashed = " ${count}"
modified = " !${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = " "
style = "#e0af68"
format = "[${symbol}${pyenv_prefix}(${version} )]($style)"

[nodejs]
symbol = " "
style = "#9ece6a"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "#bb9af7"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "#7dcfff"
format = "[$symbol($version )]($style)"

[cmd_duration]
min_time = 2_000
style = "#565f89"
format = "[$duration]($style) "
show_milliseconds = false

[character]
success_symbol = "[❯](#9ece6a)"
error_symbol = "[❯](#f7768e)"
vimcmd_symbol = "[❮](#bb9af7)"
