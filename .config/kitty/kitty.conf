# /* ---- ardal dotfiles - kitty ---- */  #

# Font - ported from alacritty (JetBrains Mono Nerd Font, size 12)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Window
window_padding_width 12
background_opacity   0.8
dynamic_background_opacity 1
confirm_os_window_close 0

# Shell - aligned with login shell (zsh). No fish.
shell zsh

# SSH compatibility: xterm-256color is universally available on remote
# servers, so backspace/delete/colors/less/vim work out of the box over ssh.
# Trade-off: no 24-bit true color locally. If you want true color and are
# willing to use `kitten ssh user@host` instead of plain ssh, comment this
# line out (kitty defaults to TERM=kitty) and kitten ssh will upload the
# kitty terminfo to the remote automatically.
term xterm-256color

# Cursor
cursor_shape          beam
cursor_blink_interval 0
cursor_trail          1

# Linux display server: auto detects Wayland/X11
linux_display_server auto

# Misc
scrollback_lines      2000
wheel_scroll_min_lines 1
enable_audio_bell     no
selection_foreground  none
selection_background  none

# /* ---- Alabaster Dark palette (ported from alacritty) ---- */  #
foreground #CECECE
background #0F0F0F
cursor     #CECECE

# Normal colors (0-7)
color0  #0E1415
color1  #e25d56
color2  #55FF55
color3  #e9bf57
color4  #4a88e4
color5  #915caf
color6  #23acdd
color7  #f0f0f0

# Bright colors (8-15)
color8  #777777
color9  #f36868
color10 #55FF55
color11 #f0bf7a
color12 #6f8fdb
color13 #e987e9
color14 #4ac9e2
color15 #FFFFFF
